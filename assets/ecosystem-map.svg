  <text x="952" y="438" fill="#686C73" font-family="IBM Plex Mono, monospace" font-size="8">DIGEST · SUMMARIZE · LISTEN</text>

  <circle cx="887" cy="232" r="5" fill="#6CE1FF" filter="url(#glow-cyan)">
    <animate attributeName="cx" values="860;912;860" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="887" cy="342" r="5" fill="#FF664D">
    <animate attributeName="cx" values="860;912;860" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
