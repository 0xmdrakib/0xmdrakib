  <text x="94" y="365" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="16" font-weight="700">Domain · DNS · Email</text>
  <text x="94" y="391" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="16" font-weight="700">SSL · ENS · AgentID</text>

