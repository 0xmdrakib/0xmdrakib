    <animate attributeName="opacity" values=".35;1;.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="76" y="220" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="54" font-weight="700">AgentDomain</text>
  <text x="76" y="252" fill="#A5A8AE" font-family="Arial, sans-serif" font-size="17">Autonomous identity infrastructure for the agentic internet.</text>

