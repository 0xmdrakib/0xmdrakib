  <text x="564" y="365" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="16" font-weight="700">One registration flow</text>
  <text x="564" y="391" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="16" font-weight="700">Automated renewals</text>

  <rect x="930" y="104" width="228" height="176" rx="6" fill="#101216" stroke="#6CE1FF" stroke-opacity=".7"/>
