<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090A0C"/>
      <stop offset="1" stop-color="#11141A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity=".055"/>
    </pattern>
    <filter id="glow-acid" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="8" fill="url(#panel)"/>
  <rect x=".5" y=".5" width="1199" height="519" rx="7.5" stroke="#FFFFFF" stroke-opacity=".16"/>
  <rect width="1200" height="520" rx="8" fill="url(#grid)"/>

  <text x="42" y="48" fill="#7E828A" font-family="IBM Plex Mono, monospace" font-size="10">RAKIBHQ / PRODUCT TOPOLOGY</text>
  <text x="1157" y="48" fill="#7E828A" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="10">03 ACTIVE SYSTEMS</text>
  <path d="M42 68H1158" stroke="#FFFFFF" stroke-opacity=".16"/>

  <path d="M386 287H470" stroke="#D9FF57" stroke-opacity=".55" stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.4s" repeatCount="indefinite"/>
  </path>
  <path d="M846 232H930" stroke="#6CE1FF" stroke-opacity=".55" stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <path d="M846 342H930" stroke="#FF664D" stroke-opacity=".55" stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <rect x="42" y="104" width="804" height="368" rx="6" fill="#101216" stroke="#D9FF57" stroke-opacity=".65"/>
