  <text x="952" y="143" fill="#6CE1FF" font-family="IBM Plex Mono, monospace" font-size="9">02 / ONCHAIN</text>
  <text x="952" y="187" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="25" font-weight="700">NexoraSwap</text>
  <text x="952" y="216" fill="#A5A8AE" font-family="Arial, sans-serif" font-size="12">Multi-router DEX</text>
  <text x="952" y="246" fill="#686C73" font-family="IBM Plex Mono, monospace" font-size="8">EVM · SOLANA · CROSS-CHAIN</text>

  <rect x="930" y="296" width="228" height="176" rx="6" fill="#101216" stroke="#FF664D" stroke-opacity=".7"/>
  <rect x="930" y="296" width="228" height="6" fill="#FF664D"/>
  <text x="952" y="335" fill="#FF664D" font-family="IBM Plex Mono, monospace" font-size="9">03 / INTELLIGENCE</text>
  <text x="952" y="379" fill="#F7F7F2" font-family="Arial, sans-serif" font-size="25" font-weight="700">AtlasAssistant</text>
